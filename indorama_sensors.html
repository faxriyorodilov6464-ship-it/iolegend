<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Indorama — Sensor Search</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0d12;
    --panel: #111620;
    --border: #1e2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --green: #00ff88;
    --text: #c8d8e8;
    --muted: #4a6080;
    --card: #141c28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .logo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 4px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }
  .stat-val { color: var(--accent); font-size: 16px; font-weight: bold; display: block; }
  .stat-lbl { color: var(--muted); font-size: 10px; }

  /* Search box */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--panel);
    border: 1.5px solid var(--border);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 14px 14px 14px 44px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }
  #searchInput::placeholder { color: var(--muted); }

  /* Filter chips */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: bold;
  }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* Results info */
  .results-info {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    min-height: 18px;
  }
  .results-info span { color: var(--accent); }

  /* Cards */
  .results { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  .card:hover { border-color: var(--accent); background: #181f2e; }
  .card:active { transform: scale(0.99); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge-ai { background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
  .badge-ao { background: rgba(255,107,0,0.15); color: var(--accent2); border: 1px solid rgba(255,107,0,0.3); }
  .badge-di { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .badge-do { background: rgba(180,100,255,0.1); color: #b464ff; border: 1px solid rgba(180,100,255,0.3); }
  .badge-other { background: rgba(200,200,200,0.1); color: #888; border: 1px solid rgba(200,200,200,0.2); }

  .desc {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .meta-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #fff;
  }
  .meta-value.empty { color: var(--muted); }

  /* Expanded card */
  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card.expanded .card-detail { display: block; }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
  }
  .no-results .big { font-size: 40px; margin-bottom: 12px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 3px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding-bottom: 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }
  .page-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { color: var(--muted); }

  mark {
    background: rgba(0,212,255,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-line">
      <div class="logo-dot"></div>
      <div class="logo-text">Indorama Ventures · DCS</div>
      <div class="logo-dot"></div>
    </div>
    <h1>Sensor <span>Search</span></h1>
    <div class="subtitle">INSTRUMENT DEPARTMENT · IO LEGEND DATABASE</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="totalCount">—</span><span class="stat-lbl">Total Tags</span></div>
    <div class="stat"><span class="stat-val" id="foundCount">—</span><span class="stat-lbl">Found</span></div>
    <div class="stat"><span class="stat-val" id="sheetCount">—</span><span class="stat-lbl">Sheets</span></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="search" placeholder="Search tag, description, cabinet..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="filters" id="filterBar">
    <button class="chip active" data-filter="ALL">ALL</button>
    <button class="chip" data-filter="AI">AI — Analog In</button>
    <button class="chip" data-filter="AO">AO — Analog Out</button>
    <button class="chip" data-filter="DI">DI — Digital In</button>
    <button class="chip" data-filter="DO">DO — Digital Out</button>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <div class="results" id="results">
    <div class="loading">LOADING DATABASE...</div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

const PAGE_SIZE = 20;
let filtered = [];
let currentPage = 1;
let currentFilter = 'ALL';
let currentQuery = '';
let expandedTag = null;

// Count sheets
const sheets = new Set(DATA.map(d => d.s)).size;
document.getElementById('totalCount').textContent = DATA.length.toLocaleString();
document.getElementById('sheetCount').textContent = sheets;

function getBadgeClass(iomType) {
  if (!iomType) return 'badge-other';
  const t = iomType.toUpperCase();
  if (t.includes('AI')) return 'badge-ai';
  if (t.includes('AO')) return 'badge-ao';
  if (t.includes('DI')) return 'badge-di';
  if (t.includes('DO')) return 'badge-do';
  return 'badge-other';
}

function hl(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function getType(iomType) {
  if (!iomType) return '—';
  const t = iomType.toUpperCase();
  if (t.includes('AI')) return 'AI';
  if (t.includes('AO')) return 'AO';
  if (t.includes('DI')) return 'DI';
  if (t.includes('DO')) return 'DO';
  return iomType;
}

function search() {
  const q = currentQuery.toLowerCase().trim();
  const filter = currentFilter;

  filtered = DATA.filter(item => {
    // Type filter
    if (filter !== 'ALL') {
      const type = getType(item.y);
      if (type !== filter) return false;
    }
    // Text search
    if (!q) return true;
    return (
      (item.t && item.t.toLowerCase().includes(q)) ||
      (item.d && item.d.toLowerCase().includes(q)) ||
      (item.c && item.c.toLowerCase().includes(q)) ||
      (item.n && item.n.toLowerCase().includes(q)) ||
      (item.i && item.i.toLowerCase().includes(q)) ||
      (item.p && item.p.toLowerCase().includes(q)) ||
      (item.s && item.s.toLowerCase().includes(q))
    );
  });

  currentPage = 1;
  document.getElementById('foundCount').textContent = filtered.length.toLocaleString();
  render();
}

function render() {
  const q = currentQuery.trim();
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  // Results info
  const info = document.getElementById('resultsInfo');
  if (q || currentFilter !== 'ALL') {
    info.innerHTML = `Found <span>${total}</span> results ${q ? `for "<span>${q}</span>"` : ''}`;
  } else {
    info.innerHTML = `Showing all <span>${total}</span> sensors`;
  }

  // Results
  const container = document.getElementById('results');
  if (page.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="big">◎</div>No sensors found<br><br><span style="font-size:11px">Try a different search term</span></div>`;
  } else {
    container.innerHTML = page.map(item => {
      const isExpanded = expandedTag === item.t + item.i;
      const badgeClass = getBadgeClass(item.y);
      const typeLabel = item.y || '—';
      return `<div class="card${isExpanded ? ' expanded' : ''}" onclick="toggleCard(this, '${(item.t + item.i).replace(/'/g, "\\'")}')">
        <div class="card-top">
          <div class="tag">${hl(item.t, q)}</div>
          <div class="badge ${badgeClass}">${hl(typeLabel, q)}</div>
        </div>
        <div class="desc">${hl(item.d, q) || '<span style="color:var(--muted)">No description</span>'}</div>
        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Cabinet / Panel</span>
            <span class="meta-value ${item.c ? '' : 'empty'}">${hl(item.c, q) || '—'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Controller</span>
            <span class="meta-value ${item.n ? '' : 'empty'}">${hl(item.n, q) || '—'}</span>
          </div>
        </div>
        <div class="card-detail">
          <div class="detail-grid">
            <div class="meta-item">
              <span class="meta-label">IOM Tag</span>
              <span class="meta-value ${item.i ? '' : 'empty'}">${hl(item.i, q) || '—'}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">P&ID No.</span>
              <span class="meta-value ${item.p ? '' : 'empty'}">${hl(item.p, q) || '—'}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">IOM Type</span>
              <span class="meta-value ${item.y ? '' : 'empty'}">${hl(item.y, q) || '—'}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Sheet</span>
              <span class="meta-value">${hl(item.s, q) || '—'}</span>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Pagination
  const pag = document.getElementById('pagination');
  if (totalPages > 1) {
    pag.innerHTML = `
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>← Prev</button>
      <span class="page-info">Page ${currentPage} / ${totalPages}</span>
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>Next →</button>
    `;
  } else {
    pag.innerHTML = '';
  }
}

function toggleCard(el, key) {
  if (expandedTag === key) {
    expandedTag = null;
    el.classList.remove('expanded');
  } else {
    expandedTag = key;
    document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
    el.classList.add('expanded');
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo(0, 0);
}

// Filter chips
document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  search();
});

// Search input
let debounce;
document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value;
  clearTimeout(debounce);
  debounce = setTimeout(search, 200);
});

// Init
search();
</script>
</body>
</html>
